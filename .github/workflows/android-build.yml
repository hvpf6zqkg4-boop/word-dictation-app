name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Build Release APK
      run: ./gradlew assembleRelease
      
    - name: Run tests
      run: ./gradlew test
      
    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: word-dictation-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: word-dictation-app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        
    - name: Create Release
      if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
        tag_name: v${{ github.run_number }}
        name: 词语听写小助手 v${{ github.run_number }}
        body: |
          ## 词语听写小助手 v${{ github.run_number }}
          
          ### 🆕 自动编译版本
          编译时间: ${{ github.event.created_at }}
          编译编号: ${{ github.run_number }}
          
          ### ✅ 测试状态
          所有测试通过！
          
          ### 📱 包含文件
          1. **app-debug.apk** - 调试版（可直接安装）
          2. **app-release-unsigned.apk** - 发布版（需要签名）
          
          ### 🔧 使用说明
          1. 下载 **app-debug.apk** 安装测试
          2. 如果测试正常，可以对发布版进行签名
          3. 签名后即可发布到应用商店
          
          ### 📞 反馈问题
          如有问题，请在 Issues 中反馈
        draft: false
        prerelease: false
