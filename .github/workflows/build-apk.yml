# 文件名: .github/workflows/build-apk.yml
name: 自动构建Android APK

# 触发条件: 当你向 main 分支推送代码时自动运行
on:
  push:
    branches: [ main ]
  # 添加手动触发按钮，方便随时编译
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取你的仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置Java环境 (Android编译需要)
      - name: 设置JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 3. 赋予gradlew执行权限并开始编译Debug APK
      - name: 构建APK
        run: |
          # 如果没有gradlew，直接使用gradle命令
          gradle assembleDebug
      # 4. 上传编译好的APK作为工作流产物
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
